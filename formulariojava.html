<!DOCTYPE html>
<head>
<title>Formulario en Java</title>
</head>
<link rel="stylesheet" type="text/css" href="estilos.css">
<br><br>
<body>
<table align="center" width="70%">
    <tr>
        <td align="center">
            <form>
                <h1>Iniciar sesión</h1>
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" class="field"><br>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" class="field"><br><br>
                <p class="center-content">
                    <button type="submit" class="btn btn-green">Iniciar sesión</button></p>
            </form>
        </td>
        <td align="center">
            <font face="impact" size=10 color="white">
                <p align="right"> Formulario para</p>
                 <p align="right"> Inicio de sesión</p>
                 <p align="right"> Con JavaScript</p>
            </font>
        </td>
    </tr>
</table>
<script src="formulariojava.js">
    </script>
</body>
</html>
